services:
  search-engine:
    build: ../search-engine
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  block-indexer:
    build: ../block-indexer
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rate-limiter-service:
    build: ../rate-limiter-service
    ports:
      - "50051:50051"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  job-scheduler:
    build: ../job-scheduler
    ports:
      - "4000:4000"

  distributed-kvstore:
    build: ../distributed-kvstore
    ports:
      - "4001:4000"

  # One-shot CLI, not a daemon: run on demand with
  #   docker compose run --rm dns-resolver <domain>
  dns-resolver:
    build: ../dns-resolver
    profiles: ["tools"]

  p2p-gossip-protocol:
    build: ../p2p-gossip-protocol
    command: ["--port", "7946"]
    ports:
      - "7946:7946/udp"

  # Interactive REPL, not a daemon: run on demand with
  #   docker compose run --rm raft-consensus
  raft-consensus:
    build: ../raft-consensus
    profiles: ["tools"]
    stdin_open: true
    tty: true
