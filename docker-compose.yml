services:
  search-engine:
    build: ../search-engine
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  block-indexer:
    build: ../block-indexer
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  rate-limiter-service:
    build: ../rate-limiter-service
    ports:
      - "50051:50051"
      - "8082:8080"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  job-scheduler:
    build: ../job-scheduler
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4000 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  distributed-kvstore:
    build: ../distributed-kvstore
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4000 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200\" <&3'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # One-shot CLI, not a daemon: run on demand with
  #   docker compose run --rm dns-resolver <domain>
  dns-resolver:
    build: ../dns-resolver
    profiles: ["tools"]

  p2p-gossip-protocol:
    build: ../p2p-gossip-protocol
    command: ["--port", "7946"]
    ports:
      - "7946:7946/udp"
      - "8083:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Interactive REPL, not a daemon: run on demand with
  #   docker compose run --rm raft-consensus
  raft-consensus:
    build: ../raft-consensus
    profiles: ["tools"]
    stdin_open: true
    tty: true
