services:
  search-engine:
    build: ./search-engine
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  block-indexer:
    build: ./block-indexer
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default

  rate-limiter-service:
    build: ./rate-limiter-service
    ports:
      - "50051:50051"

  job-scheduler:
    build: ./job-scheduler
    ports:
      - "4000:4000"

  distributed-kvstore:
    build: ./distributed-kvstore
    ports:
      - "4001:4000"

  dns-resolver:
    build: ./dns-resolver
    ports:
      - "53:53/udp"
      - "53:53/tcp"

  p2p-gossip-protocol:
    build: ./p2p-gossip-protocol
    ports:
      - "7946:7946/udp"

  raft-consensus:
    build: ./raft-consensus
    stdin_open: true
    tty: true